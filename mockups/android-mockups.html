<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OrthoSync — Android Mockups</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A0A;font-family:'Roboto',sans-serif;color:#fff;padding:32px 24px 64px}
h1{text-align:center;font-size:32px;font-weight:800;margin-bottom:6px}
.subtitle{text-align:center;font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:48px}
#grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;max-width:1100px;margin:0 auto}
@media(max-width:900px){#grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){#grid{grid-template-columns:1fr}}
.row-label{grid-column:1/-1;font-size:20px;font-weight:700;color:rgba(255,255,255,0.85);border-bottom:1px solid rgba(255,255,255,0.1);padding:24px 0 8px;margin-top:16px}
.mockup-wrapper{display:flex;flex-direction:column;align-items:center}
.screen-label{margin-top:10px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.6)}

/* Android Frame */
.android-frame{width:300px;height:650px;border-radius:24px;border:3px solid #222;background:linear-gradient(180deg,#BCC5D3,#C8CFD9,#D5DAE1);position:relative;overflow:hidden;display:flex;flex-direction:column}
.punch-hole{width:8px;height:8px;background:#222;border-radius:50%;position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:10}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:4px 14px;font-size:10px;font-weight:500;color:#1A1A2E;flex-shrink:0;height:24px}
.status-bar span:last-child{font-size:9px}
.screen-content{flex:1;overflow-y:auto;padding:2px 0 0;position:relative}
.screen-content.with-tabs{padding-bottom:0}
.android-nav{display:flex;justify-content:center;gap:40px;padding:8px 0;font-size:16px;color:rgba(26,26,46,0.35);flex-shrink:0;height:32px;align-items:center}

/* Tab Bar */
.tab-bar{display:flex;background:rgba(255,255,255,0.92);border-top:1px solid rgba(0,0,0,0.06);flex-shrink:0}
.tab-bar .tb{flex:1;text-align:center;padding:6px 0 4px;font-size:9px;color:rgba(26,26,46,0.45);font-weight:500}
.tab-bar .tb.active{color:#00838F;font-weight:700}
.tab-bar .tb div:first-child{font-size:16px;margin-bottom:1px}

/* Glass Components */
.card{background:rgba(255,255,255,0.72);border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:12px;margin:8px 14px}
.input{background:rgba(255,255,255,0.85);border:1px solid rgba(0,0,0,0.08);border-radius:8px;padding:8px 10px;font-size:11px;color:rgba(26,26,46,0.50);margin:6px 0}
.btn-accent{background:linear-gradient(135deg,#00838F,#0097A7);color:#fff;border:none;border-radius:24px;padding:10px;text-align:center;font-size:12px;font-weight:700;margin-top:10px;width:100%}
.btn-outline{border:1.5px solid #0097A7;color:#0097A7;border-radius:24px;padding:8px;text-align:center;font-size:11px;font-weight:600;margin-top:8px}
.chip{display:inline-block;padding:4px 10px;border-radius:16px;font-size:10px;background:rgba(255,255,255,0.6);color:rgba(26,26,46,0.70);margin:2px 3px;border:1px solid rgba(0,0,0,0.06)}
.chip.active{background:#00838F;color:#fff;border-color:#00838F}
.stat-box{background:rgba(255,255,255,0.72);border:1px solid rgba(0,0,0,0.08);border-radius:10px;padding:10px;text-align:center;flex:1}
.stat-box .num{font-size:20px;font-weight:800;color:#1A1A2E}
.stat-box .lbl{font-size:9px;color:rgba(26,26,46,0.50);margin-top:2px}
.tabs{display:flex;gap:0;margin-bottom:10px}
.tab{flex:1;text-align:center;padding:6px;font-size:11px;font-weight:500;color:rgba(26,26,46,0.50);border-bottom:2px solid transparent}
.tab.active{color:#00838F;border-bottom-color:#00838F;font-weight:700}
.badge-blue{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;background:rgba(0,151,167,0.15);color:#00838F}
.badge-green{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;background:rgba(46,125,50,0.15);color:#2E7D32}
.badge-orange{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;background:rgba(245,124,0,0.15);color:#F57C00}
.badge-red{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;background:rgba(211,47,47,0.15);color:#D32F2F}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.05);font-size:11px;color:#1A1A2E}
.list-item:last-child{border-bottom:none}
.fab{position:absolute;bottom:12px;right:14px;width:44px;height:44px;background:linear-gradient(135deg,#00838F,#0097A7);border-radius:22px;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,0.2)}
.hdr{padding:10px 14px;font-size:16px;font-weight:700;color:#1A1A2E;display:flex;justify-content:space-between;align-items:center}
.hdr .back{font-size:18px;margin-right:8px;color:rgba(26,26,46,0.6)}
.sec{font-size:10px;font-weight:600;color:rgba(26,26,46,0.50);padding:8px 14px 4px;text-transform:uppercase;letter-spacing:0.5px}
.avatar{width:32px;height:32px;border-radius:16px;background:#0097A7;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.row{display:flex;gap:8px;padding:0 14px;margin:6px 0}
.t1{font-size:13px;font-weight:700;color:#1A1A2E}
.t2{font-size:11px;color:rgba(26,26,46,0.70)}
.t3{font-size:10px;color:rgba(26,26,46,0.50)}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 14px}
.photo-box{aspect-ratio:1;background:rgba(255,255,255,0.6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid rgba(0,0,0,0.06)}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:11px;color:#1A1A2E}
.toggle{width:34px;height:18px;background:#0097A7;border-radius:9px;position:relative}
.toggle::after{content:'';width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:2px;right:2px}
.menu-item{display:flex;align-items:center;gap:10px;padding:12px 14px;font-size:12px;color:#1A1A2E;border-bottom:1px solid rgba(0,0,0,0.04)}
.menu-item span:first-child{font-size:18px}
</style>
</head>

function renderTabBar(active) {
  return '<div class="tab-bar">' + tabIcons.map((t, i) =>
    `<div class="tb${i === active ? ' active' : ''}"><div>${t.icon}</div>${t.label}</div>`
  ).join('') + '</div>';
}

function renderScreens() {
  const grid = document.getElementById('grid');
  let html = '';
  screens.forEach(s => {
    if (s.type === 'label') {
      html += `<div class="row-label">${s.text}</div>`;
      return;
    }
    html += `
      <div class="mockup-wrapper">
        <div class="android-frame">
          <div class="status-bar"><span>12:30</span><span>📶 🔋</span></div>
          <div class="punch-hole"></div>
          <div class="screen-content${s.hasTabBar ? ' with-tabs' : ''}">${s.content}</div>
          ${s.hasTabBar ? renderTabBar(s.activeTab || 0) : ''}
          <div class="android-nav"><span>◁</span><span>○</span><span>□</span></div>
        </div>
        <div class="screen-label">${s.name}</div>
      </div>`;
  });
  grid.innerHTML = html;
}

renderScreens();
